<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="{{ page.description | default: site.description }}">

<title>
  {% if page.title %}{{ page.title }} &mdash; {{ site.title }}
  {% else %}{{ site.title }}{% endif %}
</title>

<!-- Favicon -->
{% if site.favicon.ico %}
<link rel="icon" href="{{ site.favicon.ico }}">
{% endif %}
{% if site.favicon.apple_touch_icon %}
<link rel="apple-touch-icon" href="{{ site.favicon.apple_touch_icon }}">
{% endif %}
{% if site.favicon.favicon_32 %}
<link rel="icon" type="image/png" sizes="32x32" href="{{ site.favicon.favicon_32 }}">
{% endif %}
{% if site.favicon.favicon_16 %}
<link rel="icon" type="image/png" sizes="16x16" href="{{ site.favicon.favicon_16 }}">
{% endif %}

<!-- Stylesheet -->
<link rel="stylesheet" href="/assets/css/main.css">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://github.githubassets.com/assets/mona-sans.css">

{% seo %}
{% feed_meta %}
