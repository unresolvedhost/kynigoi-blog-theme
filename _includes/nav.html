<nav class="site-nav">
  <a class="nav-logo" href="{{ '/' | relative_url }}">kynigoi<span>.blog</span></a>

  <button class="nav-hamburger" id="nav-hamburger" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>

  <div class="nav-links" id="nav-links">
    <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>posts</a>
    <a href="{{ '/about/' | relative_url }}" {% if page.url contains 'about' %}class="active"{% endif %}>about</a>
    <a href="{{ '/tags/' | relative_url }}" {% if page.url contains 'tags' %}class="active"{% endif %}>tags</a>
    <a href="{{ '/search/' | relative_url }}" {% if page.url contains 'search' %}class="active"{% endif %}>search</a>
    <a href="https://github.com/{{ site.social.github }}" target="_blank" rel="noopener">github</a>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
      <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
      </svg>
      <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/>
      </svg>
    </button>
  </div>
</nav>

<script>
  (function() {
    var toggle  = document.getElementById('theme-toggle')
    var saved   = localStorage.getItem('theme')
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
    var isDark  = saved ? saved === 'dark' : prefersDark

    function applyTheme(dark) {
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light')
      localStorage.setItem('theme', dark ? 'dark' : 'light')
    }

    applyTheme(isDark)

    toggle.addEventListener('click', function() {
      isDark = !isDark
      applyTheme(isDark)
    })

    // Hamburger
    var hamburger = document.getElementById('nav-hamburger')
    var links     = document.getElementById('nav-links')
    hamburger.addEventListener('click', function() {
      links.classList.toggle('open')
      hamburger.classList.toggle('open')
    })

    // Close on link click
    links.querySelectorAll('a').forEach(function(a) {
      a.addEventListener('click', function() {
        links.classList.remove('open')
        hamburger.classList.remove('open')
      })
    })
  })()
</script>
